#
# Self-hosted runner PR workflow — triggered by copy-pr-bot.
#
# copy-pr-bot pushes PR code to pull-request/<number> branches only after
# a maintainer has vetted the changes (or the author is a trusted NVIDIA
# employee with signed commits). This ensures community PRs never run on
# self-hosted runners without explicit maintainer approval.
#
# Lightweight checks (lint, unit tests) still run on GitHub-hosted runners
# via the regular pr.yaml workflow, which triggers on pull_request events.
#
# See: https://docs.gha-runners.nvidia.com/platform/onboarding/pull-request-testing/

name: pr-self-hosted

on:
  push:
    branches:
      - "pull-request/[0-9]+"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-pr-info:
    runs-on: ubuntu-latest
    outputs:
      pr-info: ${{ steps.get-pr-info.outputs.pr-info }}
    steps:
      - id: get-pr-info
        uses: nv-gha-runners/get-pr-info@090577647b8ddc4e06e809e264f7881650ecdccf # main

  build-sandbox-images:
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pull base image from GHCR (fall back to local build)
        run: |
          if docker pull ghcr.io/nvidia/nemoclaw/sandbox-base:latest 2>/dev/null; then
            echo "BASE_IMAGE=ghcr.io/nvidia/nemoclaw/sandbox-base:latest" >> "$GITHUB_ENV"
          else
            echo "::warning::GHCR base image not available, building locally"
            docker build -f Dockerfile.base -t nemoclaw-sandbox-base-local .
            echo "BASE_IMAGE=nemoclaw-sandbox-base-local" >> "$GITHUB_ENV"
          fi

      - name: Build production image
        run: docker build --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} -t nemoclaw-production .

      - name: Build sandbox test image (fixtures layered on production)
        run: docker build -f test/Dockerfile.sandbox --build-arg BASE_IMAGE=nemoclaw-production -t nemoclaw-sandbox-test .

      - name: Save images to tarballs
        run: |
          docker save nemoclaw-sandbox-test | gzip > /tmp/sandbox-test-image.tar.gz
          docker save nemoclaw-production | gzip > /tmp/isolation-image.tar.gz

      - name: Upload sandbox test image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sandbox-test-image
          path: /tmp/sandbox-test-image.tar.gz
          retention-days: 1

      - name: Upload isolation image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: isolation-image
          path: /tmp/isolation-image.tar.gz
          retention-days: 1

  # ── Diagnostic job: compare Docker/filesystem behavior across runners ──
  # Runs the snapshot rollback test on BOTH self-hosted and GitHub-hosted
  # runners in parallel, with verbose diagnostics to identify why
  # renameSync/cpSync on symlink dirs fails on NVIDIA runners.
  # TODO: Remove this job once root cause is identified and fixed.
  diagnose-snapshot-rollback:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: linux-amd64-cpu4
            label: nvidia-cpu4
          - runner: linux-amd64-cpu8
            label: nvidia-cpu8
          - runner: linux-amd64-cpu16
            label: nvidia-cpu16
          - runner: ubuntu-latest
            label: github-hosted
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sandbox-test-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/sandbox-test-image.tar.gz | docker load

      - name: "Diagnostics: Host environment"
        run: |
          echo "=== Runner: ${{ matrix.label }} ==="
          echo "=== Kernel ==="
          uname -a
          echo ""
          echo "=== Docker info ==="
          docker info 2>&1 | grep -E "Storage Driver|Server Version|Operating System|Kernel Version|Cgroup|Runtime"
          echo ""
          echo "=== Docker filesystem driver details ==="
          docker info --format '{{json .Driver}}' 2>/dev/null
          docker info --format '{{json .DriverStatus}}' 2>/dev/null || true
          echo ""
          echo "=== Host mount info ==="
          mount | grep -E "overlay|docker|tmp" || true
          echo ""
          echo "=== /var/lib/docker filesystem ==="
          df -hT /var/lib/docker 2>/dev/null || echo "Cannot stat /var/lib/docker"

      - name: "Diagnostics: Container filesystem behavior"
        run: |
          echo "=== Runner: ${{ matrix.label }} ==="
          docker run --rm nemoclaw-sandbox-test bash -c '
            echo "=== Container OS ==="
            cat /etc/os-release | head -5

            echo ""
            echo "=== Filesystem type for key dirs ==="
            stat -f -c "/ : type=%T" / 2>/dev/null || stat -f / 2>/dev/null
            stat -f -c "/sandbox : type=%T" /sandbox 2>/dev/null || echo "/sandbox not found"
            stat -f -c "/tmp : type=%T" /tmp 2>/dev/null || stat -f /tmp 2>/dev/null

            echo ""
            echo "=== Mount table inside container ==="
            mount | head -20

            echo ""
            echo "=== Symlink test: create symlink dir structure like .openclaw ==="
            mkdir -p /tmp/diag-test/real-data/subdir
            echo "file1" > /tmp/diag-test/real-data/config.json
            echo "file2" > /tmp/diag-test/real-data/subdir/nested.txt
            mkdir -p /tmp/diag-test/symlinked
            ln -s /tmp/diag-test/real-data/config.json /tmp/diag-test/symlinked/config.json
            ln -s /tmp/diag-test/real-data/subdir /tmp/diag-test/symlinked/subdir
            echo "Created symlink structure:"
            ls -la /tmp/diag-test/symlinked/

            echo ""
            echo "=== Test 1: renameSync equivalent (mv) on symlink dir ==="
            mv /tmp/diag-test/symlinked /tmp/diag-test/symlinked.bak && echo "PASS: mv succeeded" || echo "FAIL: mv failed"
            ls -la /tmp/diag-test/symlinked.bak/ 2>/dev/null

            echo ""
            echo "=== Test 2: cpSync equivalent (cp -a) to recreate dir with symlinks ==="
            cp -a /tmp/diag-test/symlinked.bak /tmp/diag-test/symlinked-restored && echo "PASS: cp -a succeeded" || echo "FAIL: cp -a failed"
            ls -la /tmp/diag-test/symlinked-restored/ 2>/dev/null

            echo ""
            echo "=== Test 3: Node.js renameSync + cpSync (exact rollback code path) ==="
            node -e "
              const fs = require(\"fs\");
              const path = require(\"path\");

              // Setup: create structure mimicking .openclaw
              const base = \"/tmp/diag-node\";
              fs.mkdirSync(base + \"/openclaw-data/workspace\", { recursive: true });
              fs.writeFileSync(base + \"/openclaw-data/openclaw.json\", JSON.stringify({ test: true }));
              fs.writeFileSync(base + \"/openclaw-data/workspace/notes.md\", \"hello\");
              fs.mkdirSync(base + \"/openclaw\", { recursive: true });
              fs.symlinkSync(base + \"/openclaw-data/openclaw.json\", base + \"/openclaw/openclaw.json\");
              fs.symlinkSync(base + \"/openclaw-data/workspace\", base + \"/openclaw/workspace\");

              console.log(\"Setup complete. Structure:\");
              console.log(\"  openclaw/openclaw.json ->\", fs.readlinkSync(base + \"/openclaw/openclaw.json\"));
              console.log(\"  openclaw/workspace ->\", fs.readlinkSync(base + \"/openclaw/workspace\"));

              // Step 1: renameSync (like rollbackFromSnapshot does)
              try {
                fs.renameSync(base + \"/openclaw\", base + \"/openclaw.archived\");
                console.log(\"PASS: renameSync succeeded\");
              } catch (e) {
                console.log(\"FAIL: renameSync error:\", e.code, e.message);
              }

              // Step 2: cpSync (like rollbackFromSnapshot does)
              const snapshot = base + \"/openclaw-data\";
              try {
                fs.cpSync(snapshot, base + \"/openclaw\", { recursive: true });
                console.log(\"PASS: cpSync succeeded\");
                const files = fs.readdirSync(base + \"/openclaw\");
                console.log(\"Restored contents:\", files);
              } catch (e) {
                console.log(\"FAIL: cpSync error:\", e.code, e.message);
                console.log(\"Full error:\", JSON.stringify({ code: e.code, errno: e.errno, syscall: e.syscall, path: e.path, dest: e.dest }));
              }
            "
          '

      - name: "Run full E2E test suite (allow failure for diagnosis)"
        continue-on-error: true
        run: |
          echo "=== Runner: ${{ matrix.label }} ==="
          docker run --rm -v "${{ github.workspace }}/test:/opt/test" nemoclaw-sandbox-test /opt/test/e2e-test.sh

  test-e2e-sandbox:
    # Use GitHub-hosted runner — snapshot rollback test fails 100% on
    # linux-amd64-cpu4 self-hosted runners due to a Docker storage/filesystem
    # incompatibility (renameSync on overlayfs symlink dirs). Passes reliably
    # on ubuntu-latest. See PR #2288 for diagnosis.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sandbox-test-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/sandbox-test-image.tar.gz | docker load

      - name: Run sandbox E2E tests
        run: docker run --rm -v "${{ github.workspace }}/test:/opt/test" nemoclaw-sandbox-test /opt/test/e2e-test.sh

  test-e2e-gateway-isolation:
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: isolation-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/isolation-image.tar.gz | docker load

      - name: Run gateway isolation E2E tests
        run: NEMOCLAW_TEST_IMAGE=nemoclaw-production bash test/e2e-gateway-isolation.sh
