# Warm Pool Warmer — maintains a pool of pre-built Brev instances for E2E tests.
#
# Two-phase instance creation:
#   Phase 1 (startup-script): Clone repo, install Node.js, openshell, npm deps
#   Phase 2 (finalize via brev exec): Pull GHCR base image, run setup.sh
#
# Phase 1 runs automatically during Brev's BUILD phase via --startup-script.
# Phase 2 runs from this workflow via brev exec once BUILD reaches COMPLETED.
# Secrets (NVIDIA_API_KEY, GITHUB_TOKEN) are only needed in Phase 2.
#
# Requires Brev CLI v0.6.322+ for --type, --startup-script, brev exec.

name: e2e-pool-warmer

on:
  schedule:
    # Every 30 min, 8am–8pm ET (12:00–00:00 UTC), weekdays
    - cron: "*/30 12-23 * * 1-5"
    - cron: "0 0 * * 2-6"
  workflow_dispatch:
    inputs:
      pool_size:
        description: "Target pool size (overrides default)"
        required: false
        default: ""

permissions:
  contents: read

env:
  BREV_ORG: "Nemoclaw CI/CD"
  WARM_POOL_SIZE: "3"
  WARM_POOL_PREFIX: "e2e-warm-"
  BREV_INSTANCE_TYPE: "n2d-standard-8"
  INSTANCE_MAX_AGE_HOURS: "24"
  BREV_CLI_VERSION: "0.6.322"
  BASE_IMAGE: "ghcr.io/nvidia/nemoclaw/sandbox-base:latest"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Cycle stale instances, health-check, create new instances.
  #         New instances get --startup-script (Phase 1: tools + repo).
  #         Outputs list of instances needing finalization (Phase 2).
  # ---------------------------------------------------------------------------
  maintain-pool:
    # TODO: restore to 'NVIDIA/NemoClaw' before merge (Phase 6)
    if: github.repository == 'jyaunches/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      finalize_matrix: ${{ steps.topup.outputs.finalize_matrix }}
      has_new: ${{ steps.topup.outputs.has_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Brev CLI
        run: |
          curl -fsSL -o /tmp/brev.tar.gz \
            "https://github.com/brevdev/brev-cli/releases/download/v${BREV_CLI_VERSION}/brev-cli_${BREV_CLI_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

      - name: Authenticate Brev
        run: |
          mkdir -p ~/.brev
          echo '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev login --token "$BREV_API_TOKEN" </dev/null
        env:
          BREV_API_TOKEN: ${{ secrets.BREV_API_TOKEN }}

      - name: Override pool size (if dispatched with input)
        if: inputs.pool_size != ''
        run: echo "WARM_POOL_SIZE=${{ inputs.pool_size }}" >> "$GITHUB_ENV"

      - name: Cycle stale instances
        run: |
          echo "::group::Cycling instances older than ${INSTANCE_MAX_AGE_HOURS}h"
          CYCLED=$(scripts/e2e-pool.sh cycle) || true
          if [ -n "$CYCLED" ]; then
            echo "Destroyed:"
            echo "$CYCLED" | sed 's/^/  /'
          else
            echo "No stale instances to cycle."
          fi
          echo "::endgroup::"

      - name: Health-check surviving instances
        run: |
          echo "::group::Health-checking warm instances"
          INSTANCES=$(scripts/e2e-pool.sh list | awk '$2 == "RUNNING" && $3 == "COMPLETED" {print $1}')

          if [ -z "$INSTANCES" ]; then
            echo "No running warm instances to health-check."
          else
            for name in $INSTANCES; do
              echo "Checking $name ..."
              RESULT=$(scripts/e2e-pool.sh health-check "$name") || true
              if [ "$RESULT" = "HEALTHY" ]; then
                echo "  ✅ $name: HEALTHY"
              else
                echo "  ❌ $name: $RESULT — destroying"
                brev set "$BREV_ORG" >/dev/null 2>&1
                brev delete "$name" 2>&1 || true
              fi
            done
          fi
          echo "::endgroup::"

      - name: Top up pool
        id: topup
        run: |
          echo "::group::Topping up pool"
          CREATED=$(scripts/e2e-pool.sh warm "$WARM_POOL_SIZE") || true
          if [ -n "$CREATED" ]; then
            echo "New instances:"
            echo "$CREATED" | sed 's/^/  /'
            # Build JSON matrix for parallel finalization
            MATRIX="{\"instance\":["
            FIRST=true
            for name in $CREATED; do
              if ! $FIRST; then MATRIX="${MATRIX},"; fi
              FIRST=false
              MATRIX="${MATRIX}\"${name}\""
            done
            MATRIX="${MATRIX}]}"
            echo "finalize_matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "Matrix: $MATRIX"
          else
            echo "No new instances needed."
            echo "finalize_matrix=" >> "$GITHUB_OUTPUT"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      - name: Pool status (pre-finalize)
        if: always()
        run: |
          echo "## 🏊 Warm Pool Status (pre-finalize)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          scripts/e2e-pool.sh status 2>&1 | sed 's/\x1b\[[0-9;]*m//g' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 2: Finalize new instances — wait for BUILD COMPLETED, then run
  #         GHCR pull + setup.sh via brev exec (needs secrets).
  # ---------------------------------------------------------------------------
  finalize:
    needs: maintain-pool
    if: needs.maintain-pool.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.maintain-pool.outputs.finalize_matrix) }}
      fail-fast: false
      max-parallel: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Brev CLI
        run: |
          curl -fsSL -o /tmp/brev.tar.gz \
            "https://github.com/brevdev/brev-cli/releases/download/v${BREV_CLI_VERSION}/brev-cli_${BREV_CLI_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

      - name: Authenticate Brev
        run: |
          mkdir -p ~/.brev
          echo '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev login --token "$BREV_API_TOKEN" </dev/null
        env:
          BREV_API_TOKEN: ${{ secrets.BREV_API_TOKEN }}

      - name: Set active org
        run: brev set "$BREV_ORG"

      - name: Wait for BUILD COMPLETED
        run: |
          INSTANCE="${{ matrix.instance }}"
          echo "Waiting for $INSTANCE to complete build (startup-script Phase 1) ..."
          for attempt in $(seq 1 120); do
            LINE=$(brev ls --org "$BREV_ORG" 2>/dev/null | grep -E "^\s*${INSTANCE}\s" || true)
            STATUS=$(echo "$LINE" | awk '{print $2}')
            BUILD=$(echo "$LINE" | awk '{print $3}')
            if [ "$STATUS" = "RUNNING" ] && [ "$BUILD" = "COMPLETED" ]; then
              echo "✅ $INSTANCE build completed (after ~$((attempt * 15))s)"
              exit 0
            fi
            if [ -z "$STATUS" ]; then
              echo "❌ $INSTANCE not found in brev ls"
              exit 1
            fi
            if [ "$((attempt % 8))" -eq 0 ]; then
              echo "Still waiting... status=$STATUS build=$BUILD (attempt $attempt/120)"
            fi
            sleep 15
          done
          echo "❌ $INSTANCE build did not complete after 30 min"
          exit 1

      - name: Upload finalize script
        run: |
          INSTANCE="${{ matrix.instance }}"
          # The startup script clones main, but e2e-warm-finalize.sh and the
          # updated setup.sh only exist on this branch. Upload via brev refresh + rsync.
          echo "Uploading scripts to $INSTANCE ..."
          brev refresh || true
          rsync -az -e "ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR" \
            scripts/e2e-warm-finalize.sh scripts/setup.sh \
            "$INSTANCE":~/nemoclaw/scripts/
          brev exec "$INSTANCE" "chmod +x ~/nemoclaw/scripts/e2e-warm-finalize.sh"
          echo "Scripts uploaded."

      - name: Finalize — pull images + run setup.sh
        run: |
          INSTANCE="${{ matrix.instance }}"
          echo "Running finalization script on $INSTANCE ..."
          brev exec "$INSTANCE" "export NVIDIA_API_KEY='${{ secrets.NVIDIA_API_KEY }}' GITHUB_TOKEN='${{ github.token }}' && sg docker -c 'bash ~/nemoclaw/scripts/e2e-warm-finalize.sh'"
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

      - name: Health-check after finalization
        run: |
          RESULT=$(scripts/e2e-pool.sh health-check "${{ matrix.instance }}")
          echo "${{ matrix.instance }}: $RESULT"
          if [ "$RESULT" != "HEALTHY" ]; then
            echo "❌ Instance unhealthy after finalization"
            exit 1
          fi

      - name: Destroy on failure
        if: failure()
        run: |
          echo "Finalization failed — destroying ${{ matrix.instance }}"
          brev set "$BREV_ORG" >/dev/null 2>&1 || true
          brev delete "${{ matrix.instance }}" 2>&1 || true

  # ---------------------------------------------------------------------------
  # Job 3: Final status report.
  # ---------------------------------------------------------------------------
  report:
    needs: [maintain-pool, finalize]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Brev CLI
        run: |
          curl -fsSL -o /tmp/brev.tar.gz \
            "https://github.com/brevdev/brev-cli/releases/download/v${BREV_CLI_VERSION}/brev-cli_${BREV_CLI_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

      - name: Authenticate Brev
        run: |
          mkdir -p ~/.brev
          echo '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev login --token "$BREV_API_TOKEN" </dev/null
        env:
          BREV_API_TOKEN: ${{ secrets.BREV_API_TOKEN }}

      - name: Pool status (final)
        run: |
          echo "## 🏊 Warm Pool Status (final)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          scripts/e2e-pool.sh status 2>&1 | sed 's/\x1b\[[0-9;]*m//g' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
