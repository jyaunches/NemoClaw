# Warm Pool Warmer — maintains a pool of pre-built Brev instances for E2E tests.
#
# Runs on schedule (every 30 min during business hours, weekdays) and on
# manual dispatch. Cycles stale instances, health-checks the rest, destroys
# unhealthy ones, and tops up to WARM_POOL_SIZE.
#
# Requires Brev CLI v0.6.322+ for --type and --startup-script support.
# Instances are created as CPU-only (n2d-standard-4, $0.13/hr) with
# brev-setup.sh running automatically via --startup-script. No separate
# bootstrap step needed — instances are warm once BUILD reaches COMPLETED.

name: e2e-pool-warmer

on:
  schedule:
    # Every 30 min, 8am–8pm ET (12:00–00:00 UTC), weekdays
    - cron: "*/30 12-23 * * 1-5"
    - cron: "0 0 * * 2-6"
  workflow_dispatch:
    inputs:
      pool_size:
        description: "Target pool size (overrides default)"
        required: false
        default: ""

permissions:
  contents: read

env:
  BREV_ORG: "Nemoclaw CI/CD"
  WARM_POOL_SIZE: "3"
  WARM_POOL_PREFIX: "e2e-warm-"
  BREV_INSTANCE_TYPE: "n2d-standard-4"
  INSTANCE_MAX_AGE_HOURS: "24"
  # Brev CLI v0.6.322 — required for --type, --startup-script, brev exec
  BREV_CLI_VERSION: "0.6.322"

jobs:
  maintain-pool:
    # TODO: restore to 'NVIDIA/NemoClaw' before merge (Phase 6)
    if: github.repository == 'jyaunches/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Brev CLI
        run: |
          curl -fsSL -o /tmp/brev.tar.gz \
            "https://github.com/brevdev/brev-cli/releases/download/v${BREV_CLI_VERSION}/brev-cli_${BREV_CLI_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

      - name: Authenticate Brev
        run: |
          mkdir -p ~/.brev
          echo '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev login --token "$BREV_API_TOKEN" </dev/null
        env:
          BREV_API_TOKEN: ${{ secrets.BREV_API_TOKEN }}

      - name: Override pool size (if dispatched with input)
        if: inputs.pool_size != ''
        run: echo "WARM_POOL_SIZE=${{ inputs.pool_size }}" >> "$GITHUB_ENV"

      - name: Cycle stale instances
        run: |
          echo "::group::Cycling instances older than ${INSTANCE_MAX_AGE_HOURS}h"
          CYCLED=$(scripts/e2e-pool.sh cycle) || true
          if [ -n "$CYCLED" ]; then
            echo "Destroyed:"
            echo "$CYCLED" | sed 's/^/  /'
          else
            echo "No stale instances to cycle."
          fi
          echo "::endgroup::"

      - name: Health-check surviving instances
        id: health
        run: |
          echo "::group::Health-checking warm instances"
          INSTANCES=$(scripts/e2e-pool.sh list | awk '$2 == "RUNNING" && $3 == "COMPLETED" {print $1}')
          HEALTHY_COUNT=0

          if [ -z "$INSTANCES" ]; then
            echo "No running warm instances to health-check."
          else
            for name in $INSTANCES; do
              echo "Checking $name ..."
              RESULT=$(scripts/e2e-pool.sh health-check "$name") || true
              if [ "$RESULT" = "HEALTHY" ]; then
                echo "  ✅ $name: HEALTHY"
                HEALTHY_COUNT=$((HEALTHY_COUNT + 1))
              else
                echo "  ❌ $name: $RESULT — destroying"
                brev set "$BREV_ORG" >/dev/null 2>&1
                brev delete "$name" 2>&1 || true
              fi
            done
          fi

          echo "healthy_count=$HEALTHY_COUNT" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Top up pool
        run: |
          echo "::group::Topping up pool"
          # warm command handles counting and creates with --startup-script
          scripts/e2e-pool.sh warm "$WARM_POOL_SIZE" || true
          echo "::endgroup::"
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Pool status summary
        if: always()
        run: |
          echo "## 🏊 Warm Pool Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          scripts/e2e-pool.sh status 2>&1 | sed 's/\x1b\[[0-9;]*m//g' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
