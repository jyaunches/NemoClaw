# Warm Pool Warmer — maintains a pool of pre-built Brev instances for E2E tests.
#
# Runs on schedule (every 30 min during business hours, weekdays) and on
# manual dispatch. Cycles stale instances, health-checks the rest, destroys
# unhealthy ones, and tops up to WARM_POOL_SIZE.
#
# Bootstrap is the slow step (~40 min). This workflow handles it so that
# the test runner (e2e-brev.yaml) never has to wait.

name: e2e-pool-warmer

on:
  schedule:
    # Every 30 min, 8am–8pm ET (12:00–00:00 UTC), weekdays
    - cron: "*/30 12-23 * * 1-5"
    - cron: "0 0 * * 2-6"
  workflow_dispatch:
    inputs:
      pool_size:
        description: "Target pool size (overrides default)"
        required: false
        default: ""

permissions:
  contents: read

env:
  BREV_ORG: "Nemoclaw CI/CD"
  WARM_POOL_SIZE: "3"
  WARM_POOL_PREFIX: "e2e-warm-"
  BREV_CPU: "4x16"
  INSTANCE_MAX_AGE_HOURS: "24"

jobs:
  maintain-pool:
    # TODO: restore to 'NVIDIA/NemoClaw' before merge (Phase 6)
    if: github.repository == 'jyaunches/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Brev CLI
        run: |
          # Pin to v0.6.310 — v0.6.322 removed --cpu flag and defaults to GPU
          curl -fsSL -o /tmp/brev.tar.gz \
            "https://github.com/brevdev/brev-cli/releases/download/v0.6.310/brev-cli_0.6.310_linux_amd64.tar.gz"
          tar -xzf /tmp/brev.tar.gz -C /usr/local/bin brev
          chmod +x /usr/local/bin/brev

      - name: Authenticate Brev
        run: |
          mkdir -p ~/.brev
          echo '{"step":1,"hasRunBrevShell":true,"hasRunBrevOpen":true}' > ~/.brev/onboarding_step.json
          brev login --token "$BREV_API_TOKEN"
        env:
          BREV_API_TOKEN: ${{ secrets.BREV_API_TOKEN }}

      - name: Override pool size (if dispatched with input)
        if: inputs.pool_size != ''
        run: echo "WARM_POOL_SIZE=${{ inputs.pool_size }}" >> "$GITHUB_ENV"

      - name: Cycle stale instances
        run: |
          echo "::group::Cycling instances older than ${INSTANCE_MAX_AGE_HOURS}h"
          CYCLED=$(scripts/e2e-pool.sh cycle) || true
          if [ -n "$CYCLED" ]; then
            echo "Destroyed:"
            echo "$CYCLED" | sed 's/^/  /'
          else
            echo "No stale instances to cycle."
          fi
          echo "::endgroup::"

      - name: Health-check surviving instances
        id: health
        run: |
          echo "::group::Health-checking warm instances"
          INSTANCES=$(scripts/e2e-pool.sh list | awk '$2 == "RUNNING" && $3 == "COMPLETED" {print $1}')
          HEALTHY_COUNT=0
          DESTROYED=""

          if [ -z "$INSTANCES" ]; then
            echo "No running warm instances to health-check."
          else
            brev refresh || true
            for name in $INSTANCES; do
              echo "Checking $name ..."
              RESULT=$(scripts/e2e-pool.sh health-check "$name") || true
              if [ "$RESULT" = "HEALTHY" ]; then
                echo "  ✅ $name: HEALTHY"
                HEALTHY_COUNT=$((HEALTHY_COUNT + 1))
              else
                echo "  ❌ $name: $RESULT — destroying"
                brev set "$BREV_ORG" >/dev/null 2>&1
                brev delete "$name" 2>&1 || true
                DESTROYED="${DESTROYED}${name}\n"
              fi
            done
          fi

          echo "healthy_count=$HEALTHY_COUNT" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Top up pool
        id: topup
        run: |
          echo "::group::Topping up pool"
          HEALTHY=${{ steps.health.outputs.healthy_count }}
          NEEDED=$((WARM_POOL_SIZE - HEALTHY))

          if [ "$NEEDED" -le 0 ]; then
            echo "Pool at target ($HEALTHY/$WARM_POOL_SIZE). No new instances needed."
            echo "created=0" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
            exit 0
          fi

          echo "Pool has $HEALTHY healthy instances, target is $WARM_POOL_SIZE. Creating $NEEDED ..."
          CREATED=$(scripts/e2e-pool.sh warm "$WARM_POOL_SIZE") || true
          CREATED_COUNT=$(echo "$CREATED" | grep -c . || true)
          echo "Created $CREATED_COUNT instances."
          if [ -n "$CREATED" ]; then
            echo "$CREATED" | sed 's/^/  /'
          fi
          echo "created_names<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CREATED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED_COUNT" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Bootstrap new instances
        if: steps.topup.outputs.created != '0'
        run: |
          echo "::group::Bootstrapping new instances"
          NAMES="${{ steps.topup.outputs.created_names }}"

          if [ -z "$NAMES" ]; then
            echo "No instances to bootstrap."
            echo "::endgroup::"
            exit 0
          fi

          # Wait for all instances to reach RUNNING state before bootstrapping.
          # brev create --detached returns immediately; the VM needs time to provision.
          echo "Waiting for instances to reach RUNNING state ..."
          for attempt in $(seq 1 60); do
            ALL_RUNNING=true
            for name in $NAMES; do
              STATUS=$(brev ls --org "$BREV_ORG" 2>/dev/null | grep -E "^\s*${name}\s" | awk '{print $2}')
              if [ "$STATUS" != "RUNNING" ]; then
                ALL_RUNNING=false
                break
              fi
            done
            if $ALL_RUNNING; then
              echo "All instances RUNNING after ~$((attempt * 10))s"
              break
            fi
            if [ "$((attempt % 6))" -eq 0 ]; then
              echo "Still waiting (attempt $attempt/60) ..."
            fi
            sleep 10
          done

          brev refresh || true

          # Bootstrap each instance sequentially (each takes ~40 min)
          BOOTSTRAP_FAILED=""
          for name in $NAMES; do
            echo "--- Bootstrapping $name ---"
            if scripts/e2e-pool.sh bootstrap "$name"; then
              echo "✅ $name bootstrapped"
            else
              echo "❌ $name bootstrap failed"
              BOOTSTRAP_FAILED="${BOOTSTRAP_FAILED}${name}\n"
            fi
          done

          if [ -n "$BOOTSTRAP_FAILED" ]; then
            echo ""
            echo "⚠ Some instances failed to bootstrap:"
            echo -e "$BOOTSTRAP_FAILED" | sed 's/^/  /'
          fi
          echo "::endgroup::"
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Pool status summary
        if: always()
        run: |
          echo "## 🏊 Warm Pool Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          scripts/e2e-pool.sh status 2>&1 | sed 's/\x1b\[[0-9;]*m//g' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
